
[Primary_Shrapnel_Settings]
	#The amount of shrapnel after the explosion. Higher = more lag.
	#Range: 0 ~ 1000
	shrapnelCount = 50
	#The amount of shrapnel damage. (2 points = 1 heart)
	#Range: 1.0 ~ 10000.0
	shrapnelDamage = 6.0

	[Primary_Shrapnel_Settings.Primary_Shrapnel_Visual]
		#Should shrapnel leave a smoke trail?
		showTrail = false
		#Should shrapnel leave bullet holes?
		showBulletHoles = true
		#REALISTIC: 128x128 texture
		#VANILLA: 16x16 texture
		#Allowed Values: REALISTIC, VANILLA
		bulletHoleTexture = "REALISTIC"
		#Enable impact smoke?
		showImpactSmoke = true
		#Registry name of the particle to use for trails (e.g. minecraft:campfire_cosy_smoke).
		trailParticle = "minecraft:campfire_cosy_smoke"

[Explosives_Overrides]
	#List of custom explosion sources. Format: 'modid:entity,count,damage'.
	#Example: 'minecraft:creeper,0,1.0' (Disables shrapnel for creepers).
	#Example: 'minecraft:tnt,200,15.0' (Makes TNT spawn 200 shrapnel with 15.0 damage).
	customExplosives = []

[Secondary_Debris_Global]
	#Enable secondary debris (blocks shattering into pieces)?
	enableSecondaryDebris = true
	#Should secondary debris leave a smoke trail?
	showDebrisTrail = true
	#How long (in ticks) debris lives on the ground before disappearing. (20 ticks = 1 sec)
	#Range: 1 ~ 600
	debrisGroundLifetime = 240
	#Max number of blocks that can spawn debris per explosion.
	#WARNING! Values above 100 can cause significant lag during large explosions!
	#Range: 1 ~ 2000
	maxDebrisBlocks = 100
	#The maximum number of debris allowed to rest on the ground simultaneously.
	#When this limit is reached, the oldest resting debris will be removed to make room for new ones.
	#This ensures fresh explosions always leave debris while preventing server lag from mass accumulation.
	#Range: 1 ~ 2000
	maxStaticDebris = 150
	#The maximum number of debris allowed to be in flight simultaneously.
	#When this limit is reached, the oldest flying debris will be removed (vanish) to make room for new ones.
	#This prevents server lag during massive chain explosions by prioritizing the most recent blast effects.
	#Range: 1 ~ 5000
	maxFlyingDebris = 250
	#The number of block particles spawned by each flying debris every few ticks.
	#Range: 0 ~ 10
	maxDebrisParticles = 5

	[Secondary_Debris_Global."Secondary Debris Advanced"]
		#Determines how debris energy decreases with distance from the epicenter.
		#REALISTIC: Uses a linear falloff. Energy drops sharply with distance, making the blast feel punchy but localized.
		#ARCADE: Uses a square root falloff. Debris retains high velocity over much longer distances, resulting in more chaotic and widespread destruction.
		#Allowed Values: REALISTIC, ARCADE
		debrisEnergyFalloff = "REALISTIC"
		#Determines how much fragments from a single block will deviate from the ideal trajectory, forming a cone.
		#0.0 — Absolute Precision. All fragments from a single block will fly in a single file in a perfect straight line.
		#0.2 - 0.5 — Concentrated Shot (Shotgun Choke). The fragments will fly in a dense beam, dealing focused damage.
		#1.0+ — Wide Fan. The fragments will spread out in a wide cloud, covering the maximum area but losing the density of fire.
		#Range: 0.0 ~ 10.0
		shrapnelSpread = 0.2

